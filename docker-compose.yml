services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      # Override MongoDB URI to use docker network
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: openschemaextract
      AUTH_TRUST_HOST: "true"
      NODE_ENV: production
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - openschemaextract

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - openschemaextract

volumes:
  mongodb_data:
    driver: local

networks:
  openschemaextract:
    driver: bridge
